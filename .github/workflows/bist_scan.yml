name: BIST 100 Otomatik Tarama

on:
  schedule:
    # 24/7 Komut desteği için her 5 dakikada bir çalış
    - cron: '*/5 * * * *'

  # Manuel tetikleme (test için)
  workflow_dispatch:

concurrency:
  group: bist-scan
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Bağımlılıkları Kur
        run: |
          pip install --upgrade pip
          pip install yfinance pandas numpy scikit-learn xgboost ta textblob feedparser requests python-dotenv joblib beautifulsoup4 pytrends certifi GoogleNews

      - name: BIST 100 Taraması ve Oto-Trader Çalıştır
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python cloud_scanner.py

      - name: Portföy Değişikliklerini Kaydet
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add portfolio.db telegram_offset.txt cloud_heartbeat.status || echo "Dosyalar bulunamadi"
          git commit -m "🤖 Oto-Trader: Portföy ve Telegram durumu güncellendi" || echo "Değişiklik yok"
          git pull --rebase origin main
          git push origin main
